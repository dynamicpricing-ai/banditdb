# BanditDB sandbox nginx config
# Place at /etc/nginx/sites-available/banditdb and symlink to sites-enabled/
#
# Rate limits:
#   - predict/reward: 10 req/sec per IP (burst 20) — tight, these are the hot paths
#   - everything else: 2 req/sec per IP (burst 5)  — campaign list, diagnostics
#   - /health: unlimited — safe for load balancer probes and uptime monitors

limit_req_zone $binary_remote_addr zone=predict:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general:10m  rate=2r/s;

server {
    listen 80;
    server_name _;          # replace with your domain once DNS is set up

    # ── Hot paths — generous limit for real usage, still protects against hammering
    location ~ ^/(predict|reward)$ {
        limit_req zone=predict burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # ── Health — unrestricted, safe for UptimeRobot and load balancers
    location /health {
        proxy_pass http://127.0.0.1:8080;
    }

    # ── Everything else (campaigns, checkpoint, export) — stricter
    location / {
        limit_req zone=general burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
